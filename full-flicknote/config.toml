#:schema https://ttal.guion.io/schema/config.schema.json
default_team = "default"

[sync]
  skills_paths = ["./docs/skills"]
  subagents_paths = ["./docs/agents"]
  commands_paths = ["./docs/commands"]

[prompts]
design = """\
{{skill:sp-writing-plans}} {{skill:flicknote-cli}}
Write an implementation plan for this task.
Read the task first: ttal task get {{task-id}}

Storage: Save the plan via flicknote add 'content' --project plans
Iterate with: flicknote get <id> --tree, flicknote edit <id> --section <n>
When done: annotate the task with the flicknote hex ID: task {{task-id}} annotate '<hex-id>'
Then tag-swap: task {{task-id}} modify -brainstorm -design +planned"""

research = """\
{{skill:sp-research}} {{skill:flicknote-cli}}
Research this topic thoroughly.
Read the task first: ttal task get {{task-id}}

Storage: Save findings via flicknote add 'content' --project research
Iterate with: flicknote get <id> --tree, flicknote append <id> 'more content'
When done: annotate the task with the flicknote hex ID: task {{task-id}} annotate '<hex-id>'"""

execute = """\
{{skill:sp-executing-plans}}
Implement this task following the referenced plan.
Follow each task in order: read the plan, make changes, verify, commit.
Use ttal pr create for pull requests."""

triage = """\
{{skill:triage}}
PR review posted. {{review-file}} Read it, assess and fix issues.
Post your triage update with ttal pr comment create when done.
If verdict is LGTM and no remaining issues, merge with: ttal pr merge"""

review = """\
{{skill:pr-review}}
Review PR #{{pr-number}} — "{{pr-title}}" in {{owner}}/{{repo}} (branch: {{branch}}).
Scope: ONLY changes in this PR diff, not the entire codebase.
Post your review with: ttal pr comment create "<markdown>"
End with VERDICT: NEEDS_WORK or VERDICT: LGTM.
Do NOT merge — the coder handles merging after triage."""

[teams.default]
chat_id = ""                   # Your Telegram chat ID
team_path = ""                 # Path to your workspace directory
design_agent = "ink"
research_agent = "owl"
# notification_token_env = "DEFAULT_NOTIFICATION_BOT_TOKEN"
# merge_mode = "auto"

[teams.default.agents.compass]
[teams.default.agents.ink]
[teams.default.agents.owl]
[teams.default.agents.falcon]
